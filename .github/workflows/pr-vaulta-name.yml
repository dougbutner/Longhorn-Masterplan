name: pr-vaulta-name

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate [vaultaname] prefix
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = context.payload.pull_request.title || '';
            const match = title.match(/^\[([a-zA-Z0-9_\-\.]+)\]/);
            if (!match) {
              core.setFailed(`PR title must start with [<vaultaname>]: "${title}"`);
              return;
            }
            const vaulta = match[1];
            const palette = [
              'ff3366', 'ff5533', 'ff8800', 'ffcc00', 'aadd00', '33dd66',
              '00ddaa', '00bbff', '4488ff', '7766ff', 'bb44ff', 'ff44cc',
            ];
            let h = 0;
            for (const ch of vaulta) h = (Math.imul(31, h) + ch.charCodeAt(0)) >>> 0;
            const label = `vaulta:${vaulta}`;
            const color = palette[h % palette.length];
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo, name: label, color, description: `Authored by ${vaulta}`,
              });
            }
            await github.rest.issues.addLabels({
              ...context.repo, issue_number: context.payload.pull_request.number, labels: [label],
            });
            core.info(`Validated PR by ${vaulta}; labelled ${label}.`);
